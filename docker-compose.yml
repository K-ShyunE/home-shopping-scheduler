name: home-shopping-scheduler

services:
  wails:
    build:
      context: .
      dockerfile: Dockerfile
    image: home-shopping-scheduler-wails:dev
    working_dir: /workspace
    volumes:
      - .:/workspace
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
      - npm-cache:/root/.npm
    environment:
      CGO_ENABLED: "0"
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
    command: >
      bash -c "bash scripts/build-wails.sh -platform windows/amd64 -clean -o home-shopping-scheduler.exe
      && chmod -R a+rwX build frontend/dist frontend/package-lock.json frontend/package.json.md5 go.mod go.sum"

  shell:
    image: home-shopping-scheduler-wails:dev
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace
    volumes:
      - .:/workspace
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
      - npm-cache:/root/.npm
    environment:
      CGO_ENABLED: "0"
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
    command: bash
    profiles:
      - tools

  linux-dev:
    image: home-shopping-scheduler-wails:dev
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace
    volumes:
      - .:/workspace
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
      - npm-cache:/root/.npm
      - /tmp/.X11-unix:/tmp/.X11-unix
    environment:
      DISPLAY: ${DISPLAY:-:0}
      CGO_ENABLED: "1"
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
    command: >
      bash -c "wails dev
      && chmod -R a+rwX build frontend/dist frontend/package-lock.json frontend/package.json.md5 go.mod go.sum"
    profiles:
      - gui

volumes:
  go-mod-cache:
  go-build-cache:
  npm-cache:
