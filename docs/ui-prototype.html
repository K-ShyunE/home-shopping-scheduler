<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>방송 일정 등록기 UI 시안</title>
    <style>
      :root {
        color: #1c2530;
        background: #eef2f5;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      .page {
        min-height: 100vh;
        padding: 24px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.74), rgba(255, 255, 255, 0) 34%), #eef2f5;
      }

      .workspace {
        max-width: 1120px;
        margin: 0 auto;
      }

      .app-header,
      .brand-lockup,
      .surface-heading,
      .panel-title-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .app-header {
        min-height: 68px;
        margin-bottom: 18px;
      }

      .brand-lockup {
        justify-content: flex-start;
      }

      .brand-icon {
        display: block;
        width: 48px;
        height: 48px;
        background: url("../build/appicon.png") center / contain no-repeat;
        border-radius: 8px;
        box-shadow: 0 10px 24px rgba(30, 45, 60, 0.1);
      }

      .eyebrow {
        margin: 0 0 5px;
        color: #687684;
        font-size: 12px;
        font-weight: 800;
      }

      h1,
      h2 {
        margin: 0;
        color: #172231;
        font-weight: 800;
      }

      h1 {
        font-size: 28px;
      }

      h2 {
        font-size: 22px;
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        min-height: 44px;
        border: 0;
        border-radius: 7px;
        font-weight: 800;
        cursor: pointer;
      }

      .app-layout {
        display: grid;
        grid-template-columns: 300px minmax(0, 1fr);
        gap: 18px;
        align-items: start;
      }

      .status-rail,
      .form-surface {
        background: rgba(255, 255, 255, 0.96);
        border: 1px solid #d7e0e8;
        border-radius: 8px;
        box-shadow: 0 18px 48px rgba(26, 38, 52, 0.12);
      }

      .status-rail {
        display: grid;
        gap: 12px;
        padding: 12px;
      }

      .rail-panel {
        display: grid;
        gap: 10px;
        padding: 16px;
        background: #f8fbfc;
        border: 1px solid #dfe8ee;
        border-radius: 8px;
      }

      .rail-panel p {
        margin: 0;
        color: #5e6b78;
        font-size: 13px;
        line-height: 1.5;
      }

      .status-pill {
        width: fit-content;
        padding: 5px 9px;
        color: #815e09;
        background: #fff2c2;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 800;
      }

      .rail-actions {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
      }

      .primary-button {
        padding: 0 18px;
        color: #ffffff;
        background: #25788b;
      }

      .secondary-button,
      .icon-text-button {
        padding: 0 15px;
        color: #2b3a49;
        background: #e7edf2;
      }

      .mini-button {
        min-height: 34px;
        padding: 0 10px;
        color: #2d4b5c;
        background: #e8f4f7;
        font-size: 12px;
      }

      .destination-list {
        display: grid;
        gap: 12px;
        margin: 0;
      }

      .destination-list dt {
        margin-bottom: 4px;
        color: #6b7885;
        font-size: 12px;
        font-weight: 800;
      }

      .destination-list dd {
        margin: 0;
        color: #1f2b37;
        font-size: 14px;
        font-weight: 750;
      }

      .form-surface {
        display: grid;
        gap: 18px;
        padding: 22px;
      }

      .surface-heading {
        padding-bottom: 16px;
        border-bottom: 1px solid #e3e9ef;
      }

      .surface-badge {
        padding: 8px 10px;
        color: #286071;
        background: #e6f5f8;
        border: 1px solid #c8e5ec;
        border-radius: 7px;
        font-size: 12px;
        font-weight: 800;
      }

      .date-strip {
        display: grid;
        grid-template-columns: 48px minmax(0, 1fr) 48px;
        gap: 10px;
        align-items: end;
      }

      .field,
      .date-field {
        display: grid;
        gap: 7px;
      }

      .field span,
      .date-field span {
        color: #334252;
        font-size: 13px;
        font-weight: 800;
      }

      input,
      select {
        width: 100%;
        min-height: 48px;
        padding: 0 13px;
        color: #18212b;
        background: #fbfcfd;
        border: 1px solid #c8d3dd;
        border-radius: 7px;
        outline: none;
      }

      .icon-button {
        width: 48px;
        color: #253442;
        background: #e7edf2;
        font-size: 24px;
      }

      .field-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .summary-band {
        min-height: 72px;
        padding: 15px 16px;
        background: #f5f7f0;
        border: 1px solid #dfe8c9;
        border-radius: 8px;
      }

      .summary-label {
        display: block;
        margin-bottom: 5px;
        color: #68725b;
        font-size: 12px;
        font-weight: 800;
      }

      .actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
      }

      .result-message {
        min-height: 46px;
        padding: 13px 14px;
        color: #46525f;
        background: #f8fafb;
        border: 1px solid #e0e6ec;
        border-radius: 7px;
      }

      @media (max-width: 800px) {
        .page {
          padding: 16px;
        }

        .app-header,
        .app-layout,
        .surface-heading,
        .field-grid,
        .actions {
          display: grid;
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="workspace">
        <header class="app-header">
          <div class="brand-lockup">
            <span class="brand-icon" aria-hidden="true"></span>
            <div>
              <p class="eyebrow">Home Shopping Scheduler</p>
              <h1>방송 일정 등록기</h1>
            </div>
          </div>
          <button class="icon-text-button" type="button">⚙ 설정</button>
        </header>

        <div class="app-layout">
          <aside class="status-rail">
            <section class="rail-panel">
              <span class="status-pill">연결 필요</span>
              <strong>Google 계정 연결이 필요합니다</strong>
              <p>방송 일정을 등록하려면 한 번만 Google 계정을 연결해 주세요.</p>
              <div class="rail-actions">
                <button class="primary-button" type="button">Google 연결</button>
                <button class="secondary-button" type="button">확인</button>
              </div>
            </section>

            <section class="rail-panel">
              <div class="panel-title-row">
                <strong>등록 위치</strong>
                <button class="mini-button" type="button">변경</button>
              </div>
              <dl class="destination-list">
                <div>
                  <dt>스프레드시트</dt>
                  <dd>홈쇼핑 방송 일정</dd>
                </div>
                <div>
                  <dt>캘린더</dt>
                  <dd>홈쇼핑 방송 일정</dd>
                </div>
              </dl>
            </section>
          </aside>

          <section class="form-surface">
            <div class="surface-heading">
              <div>
                <p class="eyebrow">새 일정</p>
                <h2>방송 정보를 입력하세요</h2>
              </div>
              <span class="surface-badge">시트 + 캘린더 동시 등록</span>
            </div>

            <div class="date-strip">
              <button class="icon-button" type="button">‹</button>
              <label class="date-field">
                <span>방송 날짜</span>
                <input type="text" value="2026년 6월 26일" />
              </label>
              <button class="icon-button" type="button">›</button>
            </div>

            <div class="field-grid">
              <label class="field">
                <span>홈쇼핑</span>
                <select>
                  <option>GS SHOP</option>
                  <option>CJ온스타일</option>
                </select>
              </label>
              <label class="field">
                <span>업체</span>
                <select>
                  <option>기본 업체</option>
                  <option>샘플 협력사</option>
                </select>
              </label>
            </div>

            <label class="field">
              <span>제품</span>
              <input type="text" placeholder="제품명을 입력하세요" />
            </label>

            <label class="field" style="max-width: 280px">
              <span>수량</span>
              <input type="number" min="0" />
            </label>

            <div class="summary-band">
              <span class="summary-label">등록 내용</span>
              <strong>2026년 6월 26일 · GS SHOP · 기본 업체 · 상품명</strong>
            </div>

            <div class="actions">
              <button class="secondary-button" type="button">초기화</button>
              <button class="primary-button" type="button">시트와 캘린더에 등록</button>
            </div>

            <output class="result-message">Google 계정을 연결하면 등록할 수 있습니다.</output>
          </section>
        </div>
      </section>
    </main>
  </body>
</html>
